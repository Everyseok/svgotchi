<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">SVGotchi technical bet</title>
  <desc id="desc">A figure comparing a typical AI prototype stack with the SVG-first SVGotchi stack.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #111827; }
      .title { font-size: 36px; font-weight: 800; }
      .subtitle { font-size: 18px; fill: #4b5563; }
      .label { font-size: 22px; font-weight: 800; }
      .body { font-size: 18px; fill: #374151; }
      .small { font-size: 15px; fill: #6b7280; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 16px; }
      .card { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 22; }
      .soft { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 2; rx: 18; }
      .left { fill: #fef2f2; stroke: #fecaca; stroke-width: 2; rx: 18; }
      .right { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 2; rx: 18; }
      .accent { fill: #2563eb; }
      .green { fill: #059669; }
      .red { fill: #dc2626; }
      .arrow { stroke: #6b7280; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280" />
    </marker>
  </defs>

  <rect width="1200" height="620" fill="#f3f4f6"/>

  <text x="60" y="64" class="title">The technical bet</text>
  <text x="60" y="98" class="subtitle">AI model behavior without a Python backend, hosted inference API, or normal HTML app shell.</text>

  <rect x="60" y="140" width="500" height="390" class="card"/>
  <text x="95" y="190" class="label">Typical small AI prototype</text>
  <rect x="95" y="225" width="410" height="66" class="left"/>
  <text x="125" y="265" class="body">Python notebook or backend service</text>
  <path d="M300 300 L300 335" class="arrow"/>
  <rect x="95" y="345" width="410" height="66" class="left"/>
  <text x="125" y="385" class="body">API request / server-owned inference</text>
  <path d="M300 420 L300 455" class="arrow"/>
  <rect x="95" y="465" width="410" height="66" class="left"/>
  <text x="125" y="505" class="body">HTML app, canvas, or generated UI</text>

  <rect x="640" y="140" width="500" height="390" class="card"/>
  <text x="675" y="190" class="label">SVGotchi</text>
  <rect x="675" y="225" width="410" height="66" class="right"/>
  <text x="705" y="265" class="body">SVG document is the app surface</text>
  <path d="M880 300 L880 335" class="arrow"/>
  <rect x="675" y="345" width="410" height="66" class="right"/>
  <text x="705" y="385" class="body">Browser JavaScript owns interaction</text>
  <path d="M880 420 L880 455" class="arrow"/>
  <rect x="675" y="465" width="410" height="66" class="right"/>
  <text x="705" y="505" class="body">TypeScript verifies setup and contracts</text>

  <rect x="410" y="250" width="380" height="120" class="soft"/>
  <text x="600" y="294" text-anchor="middle" class="label">SVG first</text>
  <text x="600" y="326" text-anchor="middle" class="body">browser local</text>
  <text x="600" y="354" text-anchor="middle" class="body">TypeScript controlled</text>

  <text x="60" y="575" class="small">Figure 1. The project is presented as a technical implementation claim, then proven by a running local demo and reproducible commands.</text>
</svg>
