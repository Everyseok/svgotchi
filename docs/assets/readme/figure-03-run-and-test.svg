<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">SVGotchi run and test flow</title>
  <desc id="desc">A figure showing setup, full mode, demo mode, and test commands for SVGotchi.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #111827; }
      .title { font-size: 36px; font-weight: 800; }
      .subtitle { font-size: 18px; fill: #4b5563; }
      .label { font-size: 19px; font-weight: 800; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 17px; fill: #111827; }
      .small { font-size: 14px; fill: #6b7280; }
      .step { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 18; }
      .full { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; rx: 18; }
      .demo { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
      .test { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
      .arrow { stroke: #6b7280; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280" />
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#f9fafb"/>
  <text x="60" y="64" class="title">Run and test path</text>
  <text x="60" y="98" class="subtitle">A fresh checkout can run full local mode after one explicit model setup step.</text>

  <rect x="60" y="150" width="250" height="110" class="step"/>
  <text x="90" y="190" class="label">1. Get the source</text>
  <text x="90" y="225" class="mono">git clone ...</text>

  <path d="M310 205 L380 205" class="arrow"/>

  <rect x="380" y="150" width="250" height="110" class="step"/>
  <text x="410" y="190" class="label">2. Install packages</text>
  <text x="410" y="225" class="mono">npm ci</text>

  <path d="M630 205 L700 205" class="arrow"/>

  <rect x="700" y="150" width="380" height="110" class="full"/>
  <text x="730" y="190" class="label">3. Full local AI mode</text>
  <text x="730" y="225" class="mono">npm run setup-model -- --yes</text>
  <text x="730" y="250" class="mono">npm run serve</text>

  <rect x="220" y="330" width="330" height="110" class="demo"/>
  <text x="250" y="370" class="label">Fast visual demo</text>
  <text x="250" y="405" class="mono">npm run serve:demo</text>

  <rect x="650" y="330" width="330" height="110" class="test"/>
  <text x="680" y="370" class="label">Verify the project</text>
  <text x="680" y="405" class="mono">npm test</text>

  <path d="M505 260 C505 300 385 300 385 330" class="arrow"/>
  <path d="M505 260 C505 300 815 300 815 330" class="arrow"/>

  <text x="60" y="480" class="small">Figure 3. Full mode needs local model assets; demo mode is available immediately after dependency install.</text>
</svg>
