<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">SVGotchi runtime architecture</title>
  <desc id="desc">A figure showing the static server, SVG document, browser JavaScript, local model files, and deterministic SVG rig transitions.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #111827; }
      .title { font-size: 36px; font-weight: 800; }
      .subtitle { font-size: 18px; fill: #4b5563; }
      .label { font-size: 20px; font-weight: 800; }
      .body { font-size: 16px; fill: #374151; }
      .small { font-size: 14px; fill: #6b7280; }
      .card { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 20; }
      .server { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
      .browser { fill: #f0fdf4; stroke: #86efac; stroke-width: 2; rx: 18; }
      .model { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
      .guard { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; rx: 18; }
      .arrow { stroke: #6b7280; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke-dasharray: 8 8; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #111827; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280" />
    </marker>
  </defs>

  <rect width="1200" height="680" fill="#f9fafb"/>

  <text x="60" y="64" class="title">Runtime architecture</text>
  <text x="60" y="98" class="subtitle">The server serves files. The browser owns the model call and the SVG animation.</text>

  <rect x="60" y="145" width="300" height="400" class="server"/>
  <text x="95" y="190" class="label">Node static server</text>
  <text x="95" y="226" class="body">Serves only local files:</text>
  <text x="115" y="260" class="mono">/</text>
  <text x="115" y="290" class="mono">/assets/*.js</text>
  <text x="115" y="320" class="mono">/models/*</text>
  <text x="115" y="350" class="mono">/runtime/onnxruntime/*</text>
  <text x="95" y="405" class="body">No prompt-processing backend.</text>
  <text x="95" y="435" class="body">No hosted inference API.</text>

  <rect x="450" y="145" width="300" height="400" class="browser"/>
  <text x="485" y="190" class="label">Browser SVG app</text>
  <text x="485" y="226" class="body">The opened document is SVG.</text>
  <text x="485" y="258" class="body">JavaScript handles:</text>
  <text x="505" y="292" class="mono">prompt input</text>
  <text x="505" y="322" class="mono">Transformers.js import</text>
  <text x="505" y="352" class="mono">emotion labels</text>
  <text x="505" y="382" class="mono">pose transitions</text>
  <text x="485" y="435" class="body">The prompt stays in-browser.</text>

  <rect x="840" y="145" width="300" height="180" class="model"/>
  <text x="875" y="190" class="label">Local model files</text>
  <text x="875" y="226" class="body">Downloaded once by setup.</text>
  <text x="875" y="258" class="mono">tanaos emotion ONNX</text>
  <text x="875" y="288" class="mono">tokenizer + WASM runtime</text>

  <rect x="840" y="365" width="300" height="180" class="guard"/>
  <text x="875" y="410" class="label">TypeScript guardrail</text>
  <text x="875" y="446" class="body">Contracts validate the rig.</text>
  <text x="875" y="478" class="body">Scores become safe poses.</text>
  <text x="875" y="510" class="body">The model never emits SVG.</text>

  <path d="M360 245 L450 245" class="arrow"/>
  <path d="M750 275 L840 235" class="arrow"/>
  <path d="M840 455 L750 415" class="arrow"/>
  <path d="M600 545 C600 610 250 610 210 545" class="arrow dash"/>
  <text x="395" y="625" text-anchor="middle" class="small">Rendered result is still the same SVG surface.</text>

  <text x="60" y="625" class="small">Figure 2. Localhost is a file server, while browser JavaScript performs local inference and deterministic SVG rig updates.</text>
</svg>
