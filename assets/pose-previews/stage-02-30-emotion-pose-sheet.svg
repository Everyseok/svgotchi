  <title id="title">SVGotchi 30-emotion uploaded PNG pose sheet</title>
  <desc id="desc">Thirty emotion poses using the uploaded character asset from assets/1.png in one shared SVG rig structure.</desc>
  <style>
    .bg { fill: #140f1f; }
