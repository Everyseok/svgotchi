<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 124" role="img" aria-labelledby="title desc">
  <title id="title">SVGotchi Stage 0 character concept candidates</title>
  <desc id="desc">Five simple pixel-style riggable Tamagotchi character concept previews in 100 by 100 SVG layouts.</desc>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 5px; fill: #2d2a32; }
    .cell { fill: #fbfaf5; stroke: #2d2a32; stroke-width: 1; shape-rendering: crispEdges; }
    .pet-area { fill: #eef8f3; }
    .prompt-area { fill: #f6e7bd; stroke: #2d2a32; stroke-width: 0.8; shape-rendering: crispEdges; }
    .body-outline { stroke: #2d2a32; stroke-width: 2; shape-rendering: crispEdges; }
    .pixel { shape-rendering: crispEdges; }
    .shadow { fill: #000; opacity: 0.12; }
    .guide { fill: none; stroke: #7c7383; stroke-width: 0.35; stroke-dasharray: 1 1; opacity: 0.45; }
  </style>

  <rect width="560" height="124" fill="#f3f0e6"/>

  <!-- Concept A: Mochi Sprout -->
  <g transform="translate(8 8)">
    <rect class="cell" width="100" height="100"/>
    <rect class="pet-area" x="0" y="0" width="100" height="80"/>
    <rect class="prompt-area" x="4" y="82" width="92" height="14"/>
    <rect class="guide" x="30" y="18" width="40" height="44"/>
    <ellipse class="shadow" cx="50" cy="66" rx="19" ry="4"/>
    <rect class="body-outline" x="32" y="20" width="36" height="40" rx="10" fill="#ffe1ef"/>
    <rect class="pixel" x="38" y="14" width="8" height="8" fill="#7ecb83" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="47" y="10" width="7" height="11" fill="#90d98e" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="55" y="14" width="8" height="8" fill="#7ecb83" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="40" y="37" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="56" y="37" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="47" y="49" width="8" height="3" fill="#2d2a32"/>
    <rect class="pixel" x="36" y="46" width="6" height="3" fill="#ff95bd"/>
    <rect class="pixel" x="59" y="46" width="6" height="3" fill="#ff95bd"/>
    <rect class="pixel" x="36" y="60" width="8" height="5" fill="#ffc8dc" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="57" y="60" width="8" height="5" fill="#ffc8dc" stroke="#2d2a32" stroke-width="1"/>
    <text x="14" y="91">tap message...</text>
    <text x="20" y="114">A Mochi Sprout</text>
  </g>

  <!-- Concept B: Capsule Bunny -->
  <g transform="translate(118 8)">
    <rect class="cell" width="100" height="100"/>
    <rect class="pet-area" x="0" y="0" width="100" height="80" fill="#eef6ff"/>
    <rect class="prompt-area" x="4" y="82" width="92" height="14"/>
    <rect class="guide" x="30" y="18" width="40" height="44"/>
    <ellipse class="shadow" cx="50" cy="66" rx="20" ry="4"/>
    <rect class="body-outline" x="31" y="22" width="38" height="39" rx="8" fill="#f7f0ff"/>
    <rect class="body-outline" x="35" y="11" width="8" height="18" rx="3" fill="#f7f0ff"/>
    <rect class="body-outline" x="57" y="11" width="8" height="18" rx="3" fill="#f7f0ff"/>
    <rect class="pixel" x="38" y="15" width="3" height="8" fill="#ffc2db"/>
    <rect class="pixel" x="60" y="15" width="3" height="8" fill="#ffc2db"/>
    <rect class="pixel" x="40" y="38" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="56" y="38" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="48" y="49" width="3" height="3" fill="#2d2a32"/>
    <rect class="pixel" x="51" y="52" width="5" height="2" fill="#2d2a32"/>
    <rect class="pixel" x="35" y="47" width="6" height="3" fill="#ff9ec4"/>
    <rect class="pixel" x="60" y="47" width="6" height="3" fill="#ff9ec4"/>
    <rect class="pixel" x="27" y="44" width="5" height="9" fill="#f7f0ff" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="68" y="44" width="5" height="9" fill="#f7f0ff" stroke="#2d2a32" stroke-width="1"/>
    <text x="14" y="91">tap message...</text>
    <text x="18" y="114">B Capsule Bunny</text>
  </g>

  <!-- Concept C: Star Pudding -->
  <g transform="translate(228 8)">
    <rect class="cell" width="100" height="100"/>
    <rect class="pet-area" x="0" y="0" width="100" height="80" fill="#fff8dc"/>
    <rect class="prompt-area" x="4" y="82" width="92" height="14"/>
    <rect class="guide" x="30" y="18" width="40" height="44"/>
    <ellipse class="shadow" cx="50" cy="67" rx="21" ry="4"/>
    <rect class="body-outline" x="31" y="25" width="38" height="35" rx="6" fill="#ffe58f"/>
    <rect class="pixel" x="35" y="21" width="30" height="8" fill="#ffcf66" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="48" y="12" width="5" height="5" fill="#fff07c" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="45" y="17" width="11" height="5" fill="#fff07c" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="41" y="38" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="57" y="38" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="46" y="50" width="11" height="3" fill="#2d2a32"/>
    <rect class="pixel" x="36" y="46" width="6" height="3" fill="#ffad90"/>
    <rect class="pixel" x="59" y="46" width="6" height="3" fill="#ffad90"/>
    <rect class="pixel" x="36" y="60" width="8" height="5" fill="#ffe58f" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="57" y="60" width="8" height="5" fill="#ffe58f" stroke="#2d2a32" stroke-width="1"/>
    <text x="14" y="91">tap message...</text>
    <text x="20" y="114">C Star Pudding</text>
  </g>

  <!-- Concept D: Pebble Pup -->
  <g transform="translate(338 8)">
    <rect class="cell" width="100" height="100"/>
    <rect class="pet-area" x="0" y="0" width="100" height="80" fill="#f2fff2"/>
    <rect class="prompt-area" x="4" y="82" width="92" height="14"/>
    <rect class="guide" x="30" y="18" width="40" height="44"/>
    <ellipse class="shadow" cx="50" cy="67" rx="21" ry="4"/>
    <rect class="body-outline" x="30" y="23" width="40" height="38" rx="9" fill="#cdeecb"/>
    <rect class="body-outline" x="25" y="25" width="10" height="15" rx="2" fill="#b7dfb4"/>
    <rect class="body-outline" x="65" y="25" width="10" height="15" rx="2" fill="#b7dfb4"/>
    <rect class="pixel" x="40" y="38" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="56" y="38" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="49" y="47" width="4" height="4" fill="#2d2a32"/>
    <rect class="pixel" x="45" y="52" width="11" height="3" fill="#2d2a32"/>
    <rect class="pixel" x="35" y="47" width="6" height="3" fill="#ff9daa"/>
    <rect class="pixel" x="60" y="47" width="6" height="3" fill="#ff9daa"/>
    <rect class="pixel" x="72" y="45" width="7" height="5" fill="#b7dfb4" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="77" y="40" width="5" height="5" fill="#b7dfb4" stroke="#2d2a32" stroke-width="1"/>
    <text x="14" y="91">tap message...</text>
    <text x="22" y="114">D Pebble Pup</text>
  </g>

  <!-- Concept E: Jelly Ghost -->
  <g transform="translate(448 8)">
    <rect class="cell" width="100" height="100"/>
    <rect class="pet-area" x="0" y="0" width="100" height="80" fill="#f0fbff"/>
    <rect class="prompt-area" x="4" y="82" width="92" height="14"/>
    <rect class="guide" x="30" y="18" width="40" height="44"/>
    <ellipse class="shadow" cx="50" cy="67" rx="20" ry="4"/>
    <rect class="body-outline" x="31" y="20" width="38" height="40" rx="14" fill="#dff8ff"/>
    <rect class="pixel" x="31" y="55" width="8" height="8" fill="#dff8ff" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="46" y="55" width="8" height="8" fill="#dff8ff" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="61" y="55" width="8" height="8" fill="#dff8ff" stroke="#2d2a32" stroke-width="1"/>
    <rect class="pixel" x="40" y="38" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="56" y="38" width="5" height="5" fill="#2d2a32"/>
    <rect class="pixel" x="47" y="50" width="8" height="3" fill="#2d2a32"/>
    <rect class="pixel" x="35" y="46" width="6" height="3" fill="#93d5ff"/>
    <rect class="pixel" x="60" y="46" width="6" height="3" fill="#93d5ff"/>
    <rect class="pixel" x="63" y="18" width="6" height="6" fill="#b6e9ff" stroke="#2d2a32" stroke-width="1"/>
    <text x="14" y="91">tap message...</text>
    <text x="22" y="114">E Jelly Ghost</text>
  </g>
</svg>
